name: Nightly Metrics Collection

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Prevent overlapping nightly runs from racing each other on the dev->main publish.
concurrency:
  group: nightly-metrics-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      # GitFlow: generate on dev, never write main directly.
      - name: Checkout dev
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: dev
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect metrics
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          FORKSYNC_REPO: ${{ vars.FORKSYNC_REPO || 'perditioinc/forksync' }}
          REPORIUM_DB_REPO: ${{ vars.REPORIUM_DB_REPO || 'perditioinc/reporium-db' }}
        run: python collect.py

      - name: Generate README
        run: python generate.py

      - name: Configure git
        run: |
          git config user.name "perditio-bot"
          git config user.email "bot@perditio.com"

      - name: Commit snapshot to dev
        run: |
          BUILD=$(cat BUILD 2>/dev/null || echo "0")
          BUILD=$((BUILD + 1))
          echo $BUILD > BUILD
          git add metrics.json README.md BUILD
          # [skip ci] keeps this bot commit from re-triggering push-driven workflows.
          git diff --staged --quiet || git commit -m "chore(data): nightly snapshot build($BUILD) $(date -u +%Y-%m-%d) [skip ci]"
          git push origin dev

      - name: Publish to main (fast-forward dev -> main)
        # Every change now flows through dev, so main is always an ancestor of dev
        # and this push is a clean fast-forward. main stays the published branch.
        run: git push origin dev:main
